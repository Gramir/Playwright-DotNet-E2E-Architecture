name: E2E CI

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]
  workflow_dispatch:

jobs:
  smoke-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore

      - name: Install Playwright Browsers
        run: pwsh Playwright_DotNet_E2E/bin/Debug/net9.0/playwright.ps1 install --with-deps

      - name: Run Smoke Suite
        run: dotnet test --no-build --filter "Category=UI&Category=Smoke" --logger "trx;LogFileName=smoke.trx"

      - name: Upload Smoke Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-results
          path: |
            **/*.trx
            **/TestResults/**

  full-suite:
    runs-on: ubuntu-latest
    needs: smoke-gate
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore

      - name: Install Playwright Browsers
        run: pwsh Playwright_DotNet_E2E/bin/Debug/net9.0/playwright.ps1 install --with-deps

      - name: Run Full Suite
        run: dotnet test --no-build --logger "trx;LogFileName=full-suite.trx"

      - name: Upload Full Suite Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: full-suite-results
          path: |
            **/*.trx
            **/TestResults/**
